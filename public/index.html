<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Monthly Habit Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #7b2cbf;
            --primary-light: #e0aaff;
        }

        [data-theme=\"light\"] {
            --bg-color: #f4f2f8;
            --card-bg: #ffffff;
            --text-color: #1a1a2e;
            --text-muted: #6c757d;
            --border-color: #e2dff0;
            --table-header-text: #ffffff;
            --row-alt: #faf9fd;
            --summary-bg: #f0ecfa;
            --input-bg: #ffffff;
            --input-border: #d0cce8;
            --chip-bg: #f0ecfa;
            --chip-hover: #e5dff5;
            --overlay-bg: rgba(0,0,0,0.08);
            --menu-bg: #ffffff;
            --menu-shadow: 0 4px 24px rgba(123,44,191,0.13);
            --settings-bg: rgba(255,255,255,0.8);
        }

        [data-theme=\"dark\"] {
            --bg-color: #0b0914;
            --card-bg: #161224;
            --text-color: #f3f0fa;
            --text-muted: #a39cb5;
            --border-color: #2c2547;
            --table-header-text: #ffffff;
            --row-alt: #1d1830;
            --summary-bg: #241c3f;
            --input-bg: #1f1a33;
            --input-border: #3b325c;
            --chip-bg: #241c3f;
            --chip-hover: #322757;
            --overlay-bg: rgba(0,0,0,0.4);
            --menu-bg: #1c172e;
            --menu-shadow: 0 4px 24px rgba(0,0,0,0.5);
            --settings-bg: rgba(22,18,36,0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 1400px; display: flex; flex-direction: column; gap: 20px; }
        
        /* Auth Screen Card layout */
        .auth-card { background: var(--card-bg); border-radius: 16px; padding: 30px; max-width: 450px; width: 100%; margin: 80px auto; border: 1px solid var(--border-color); box-shadow: var(--menu-shadow); }
        .auth-tabs { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 25px; }
        .auth-tab { flex: 1; text-align: center; padding: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; }
        .auth-tab.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
        .form-group { margin-bottom: 18px; display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.9rem; font-weight: 600; color: var(--text-color); }
        .form-group input { padding: 12px; border-radius: 8px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color); font-size: 1rem; outline: none; }
        .form-group input:focus { border-color: var(--primary-color); }
        .auth-btn { background: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        .auth-btn:hover { opacity: 0.9; }

        /* Main Workspace layout */
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 15px 25px; border-radius: 12px; border: 1px solid var(--border-color); }
        .user-profile { display: flex; align-items: center; gap: 15px; }
        .logout-btn { background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .logout-btn:hover { background: var(--primary-color); color: white; }
        
        .main-layout { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 992px) { .main-layout { grid-template-columns: 320px 1fr; } }
        
        .panel { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .input-row { display: flex; gap: 10px; }
        .input-row input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color); outline: none; }
        .btn-add { background: var(--primary-color); color: white; border: none; padding: 0 15px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        
        .habit-list { display: flex; flex-direction: column; gap: 8px; }
        .habit-chip { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--chip-bg); border-radius: 8px; font-weight: 500; font-size: 0.95rem; position: relative; }
        .habit-chip:hover { background: var(--chip-hover); }
        
        /* Fixed Dropdown Menu implementation */
        .burger-menu-btn { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); padding: 2px 6px; border-radius: 4px; }
        .burger-menu-btn:hover { color: var(--text-color); background: rgba(128,128,128,0.1); }
        .dropdown-menu { display: none; position: absolute; right: 10px; top: 35px; background: var(--menu-bg); border: 1px solid var(--border-color); border-radius: 6px; box-shadow: var(--menu-shadow); z-index: 100; min-width: 100px; overflow: hidden; }
        .dropdown-menu.show { display: block; }
        .dropdown-item { padding: 8px 12px; font-size: 0.85rem; cursor: pointer; text-align: left; color: var(--text-color); display: block; width: 100%; border: none; background: transparent; }
        .dropdown-item:hover { background: var(--primary-color); color: white; }

        /* Metrics Table view Grid system */
        .table-container { overflow-x: auto; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th, td { padding: 10px 12px; border-bottom: 1px solid var(--border-color); white-space: nowrap; }
        th { background: var(--primary-color); color: var(--table-header-text); font-weight: 600; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: var(--row-alt); }
        
        /* Direct responsiveness fixing for trackers */
        .cell-checkbox { width: 22px; height: 22px; accent-color: var(--primary-color); cursor: pointer; transform: scale(1.1); display: block; margin: 0 auto; }
        .summary-cell { background: var(--summary-bg); font-weight: 700; color: var(--primary-color); text-align: center; }
        
        .theme-toggle { background: transparent; border: 1px solid var(--border-color); padding: 8px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="auth-view" class="auth-card">
        <div class="auth-tabs">
            <div id="tab-login" class="auth-tab active" onclick="switchAuthTab('login')">Login</div>
            <div id="tab-register" class="auth-tab" onclick="switchAuthTab('register')">Register</div>
        </div>
        <h3 id="auth-title" style="text-align: center; margin-bottom: 20px; color: var(--primary-color);">Account Access</h3>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="auth-username" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="auth-password" placeholder="Enter password">
        </div>
        <button class="auth-btn" onclick="handleAuthSubmit()">Submit</button>
    </div>

    <div id="app-view" style="display: none;" class="app-container">
        <div class="header">
            <div class="user-profile">
                <h2>Dynamic Habit Matrix</h2>
                <span id="welcome-banner" style="color: var(--text-muted); font-weight: 500;"></span>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="panel">
                <div>
                    <h3 style="margin-bottom: 12px;">Add New Metric</h3>
                    <div class="input-row">
                        <input type="text" id="new-habit-name" placeholder="E.g., Reading Books">
                        <button class="btn-add" onclick="handleAddHabit()">Add</button>
                    </div>
                </div>
                <div>
                    <h3 style="margin-bottom: 12px;">Active Trackers</h3>
                    <div id="habit-list-target" class="habit-list"></div>
                </div>
                <div>
                    <canvas id="analyticsChart" style="max-height: 220px;"></canvas>
                </div>
            </div>

            <div class="table-container">
                <table id="matrix-table">
                    <thead>
                        <tr id="thead-row"></tr>
                    </thead>
                    <tbody id="tbody-rows"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let authMode = 'login';
    let token = localStorage.getItem('auth_token') || '';
    let habits = [];
    let trackerData = {}; // Format: { "HabitName": { "day_1": true, "day_5": false } }
    let chartInstance = null;

    // Bootstrapping verification check
    window.addEventListener('DOMContentLoaded', () => {
        if(token) {
            showDashboard();
        } else {
            document.getElementById('auth-view').style.display = 'block';
            document.getElementById('app-view').style.display = 'none';
        }
        setupGlobalClickListeners();
    });

    function switchAuthTab(mode) {
        authMode = mode;
        document.getElementById('tab-login').classList.toggle('active', mode === 'login');
        document.getElementById('tab-register').classList.toggle('active', mode === 'register');
        document.getElementById('auth-title').innerText = mode === 'login' ? 'Account Login' : 'Create Account';
    }

    async function handleAuthSubmit() {
        const username = document.getElementById('auth-username').value.trim();
        const password = document.getElementById('auth-password').value;

        if(!username || !password) return alert('Please complete all form credentials.');

        const endpoint = authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
        
        try {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            const responseText = await res.text();
            let data;
            try {
                data = JSON.parse(responseText);
            } catch(e) {
                throw new Error(`Server processing fault (${res.status}). Verify cloud variables config.`);
            }

            if(!res.ok) throw new Error(data.error || 'Operation execution failure.');

            if(authMode === 'login') {
                localStorage.setItem('auth_token', data.token);
                localStorage.setItem('auth_username', data.username);
                token = data.token;
                showDashboard();
            } else {
                alert('Registration success! Moving to logging gateway.');
                switchAuthTab('login');
            }
        } catch(err) {
            alert(err.message);
        }
    }

    function handleLogout() {
        localStorage.clear();
        token = '';
        habits = [];
        trackerData = {};
        document.getElementById('auth-view').style.display = 'block';
        document.getElementById('app-view').style.display = 'none';
    }

    async function showDashboard() {
        document.getElementById('auth-view').style.display = 'none';
        document.getElementById('app-view').style.display = 'flex';
        document.getElementById('welcome-banner').innerText = `@${localStorage.getItem('auth_username') || 'user'}`;
        await syncFetchData();
    }

    async function syncFetchData() {
        try {
            const res = await fetch('/api/tracker', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if(!res.ok) throw new Error('Could not pull cloud profile matrix data.');
            const body = await res.json();
            
            trackerData = body.data || {};
            habits = Object.keys(trackerData);
            
            renderWorkspaceMatrix();
        } catch(err) {
            console.error(err);
            handleLogout();
        }
    }

    async function pushDataUpdate() {
        try {
            await fetch('/api/tracker', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ data: trackerData })
            });
        } catch(e) {
            console.error('Autosave sync delay:', e.message);
        }
    }

    function renderWorkspaceMatrix() {
        const daysInMonth = 31; 
        const thead = document.getElementById('thead-row');
        const tbody = document.getElementById('tbody-rows');
        
        // Build table headers dynamically
        let headHTML = `<th>Tracking Metric</th>`;
        for(let d=1; d<=daysInMonth; d++) {
            headHTML += `<th style="text-align:center; min-width:35px;">${d}</th>`;
        }
        headHTML += `<th style="text-align:center; background:#6b21a8;">Score</th>`;
        thead.innerHTML = headHTML;

        // Render table records alongside calculation layers
        let bodyHTML = '';
        habits.forEach((habit) => {
            bodyHTML += `<tr>`;
            bodyHTML += `<td style="font-weight:600; min-width:160px;">${escapeHtml(habit)}</td>`;
            
            let completeCount = 0;
            for(let d=1; d<=daysInMonth; d++) {
                const isChecked = trackerData[habit] && trackerData[habit][`day_${d}`] === true;
                if(isChecked) completeCount++;
                
                bodyHTML += `
                <td style="text-align:center;">
                    <input type="checkbox" 
                           class="cell-checkbox" 
                           data-habit="${escapeHtml(habit)}" 
                           data-day="${d}" 
                           ${isChecked ? 'checked' : ''} 
                           onclick="handleCheckboxToggle(this)">
                </td>`;
            }
            
            bodyHTML += `<td id="score-${cssSafeId(habit)}" class="summary-cell">${completeCount} / ${daysInMonth}</td>`;
            bodyHTML += `</tr>`;
        });
        tbody.innerHTML = bodyHTML;

        // Populate side control panels and chart modules
        renderSidebarHabitList();
        renderAnalyticsChart(daysInMonth);
    }

    function renderSidebarHabitList() {
        const container = document.getElementById('habit-list-target');
        container.innerHTML = '';
        
        habits.forEach((habit) => {
            const chip = document.createElement('div');
            chip.className = 'habit-chip';
            chip.innerHTML = `
                <span>${escapeHtml(habit)}</span>
                <button class="burger-menu-btn">⋮</button>
                <div class="dropdown-menu">
                    <button class="dropdown-item" onclick="promptEditHabit('${escapeHtml(habit)}')">Rename</button>
                    <button class="dropdown-item" style="color:#ef4444;" onclick="handleDeleteHabit('${escapeHtml(habit)}')">Delete</button>
                </div>
            `;
            container.appendChild(chip);
        });
    }

    // Fix Checkbox Lag with Optimistic UI Updating
    function handleCheckboxToggle(checkbox) {
        const habit = checkbox.getAttribute('data-habit');
        const day = checkbox.getAttribute('data-day');
        const isChecked = checkbox.checked;

        // Update the state locally instantly
        if (!trackerData[habit]) trackerData[habit] = {};
        trackerData[habit][`day_${day}`] = isChecked;

        // Instantly recalculate score without reloading table frame
        let newCount = 0;
        for (let d = 1; d <= 31; d++) {
            if (trackerData[habit][`day_${d}`] === true) newCount++;
        }
        document.getElementById(`score-${cssSafeId(habit)}`).innerText = `${newCount} / 31`;

        // Update analytics chart in real-time
        renderAnalyticsChart(31);

        // Send network save silently in background
        pushDataUpdate();
    }

    function handleAddHabit() {
        const input = document.getElementById('new-habit-name');
        const name = input.value.trim();
        if(!name) return;

        if(trackerData[name]) {
            alert('A tracking profile metric with this designation already exists.');
            return;
        }

        trackerData[name] = {};
        habits.push(name);
        input.value = '';
        
        renderWorkspaceMatrix();
        pushDataUpdate();
    }

    function promptEditHabit(oldName) {
        const newName = prompt(`Change metric name for "${oldName}":`, oldName);
        if(!newName || newName.trim() === oldName) return;
        
        const cleanNewName = newName.trim();
        if(trackerData[cleanNewName]) {
            alert('Destination moniker matches an existing configuration container.');
            return;
        }

        trackerData[cleanNewName] = trackerData[oldName];
        delete trackerData[oldName];
        
        const idx = habits.indexOf(oldName);
        if(idx !== -1) habits[idx] = cleanNewName;

        renderWorkspaceMatrix();
        pushDataUpdate();
    }

    function handleDeleteHabit(name) {
        if(!confirm(`Permanently remove tracker column for "${name}"? Progress metrics will clear.`)) return;
        
        delete trackerData[name];
        habits = habits.filter(h => h !== name);
        
        renderWorkspaceMatrix();
        pushDataUpdate();
    }

    // Fixed Burger Dropdown Listeners
    function setupGlobalClickListeners() {
        document.addEventListener('click', (e) => {
            // Close opened dropdown menus if clicked outside
            if (!e.target.classList.contains('burger-menu-btn')) {
                document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
                    menu.classList.remove('show');
                });
                return;
            }

            // Toggle target drop menu layer layout contextually
            const parentChip = e.target.closest('.habit-chip');
            const targetMenu = parentChip.querySelector('.dropdown-menu');
            
            document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
                if(menu !== targetMenu) menu.classList.remove('show');
            });
            
            targetMenu.classList.toggle('show');
        });
    }

    function renderAnalyticsChart(daysInMonth) {
        const ctx = document.getElementById('analyticsChart').getContext('2d');
        const dataPoints = [];
        const labelPoints = [];

        for(let d=1; d<=daysInMonth; d++) {
            labelPoints.push(d);
            let totalActiveTrackers = habits.length;
            if(totalActiveTrackers === 0) {
                dataPoints.push(0);
                continue;
            }

            let completedOnDay = 0;
            habits.forEach(h => {
                if(trackerData[h] && trackerData[h][`day_${d}`] === true) completedOnDay++;
            });

            const dayPercentage = Math.round((completedOnDay / totalActiveTrackers) * 100);
            dataPoints.push(dayPercentage);
        }

        const themeColor = getComputedStyle(document.documentElement).getPropertyValue('--primary-color').trim() || '#7b2cbf';

        if(chartInstance) {
            chartInstance.data.datasets[0].data = dataPoints;
            chartInstance.data.datasets[0].borderColor = themeColor;
            chartInstance.data.datasets[0].backgroundColor = themeColor + '22';
            chartInstance.data.datasets[0].pointBackgroundColor = themeColor;
            chartInstance.update();
        } else {
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labelPoints,
                    datasets: [{
                        label: 'Completion rate (%)',
                        data: dataPoints,
                        borderColor: themeColor,
                        backgroundColor: themeColor + '22',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true,
                        pointBackgroundColor: themeColor,
                        pointRadius: 3
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { min: 0, max: 100, ticks: { callback: v => v + '%', color: '#888' }, grid: { color: 'rgba(128,128,128,0.1)' } },
                        x: { title: { display: true, text: 'Days of Month', color: '#888' }, ticks: { color: '#888' }, grid: { color: 'rgba(128,128,128,0.1)' } }
                    },
                    plugins: { legend: { labels: { color: '#888' } } }
                }
            });
        }
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', nextTheme);
        document.querySelector('.theme-toggle').innerText = nextTheme === 'dark' ? '☀️' : '🌙';
        if(chartInstance) {
            const themeColor = getComputedStyle(document.documentElement).getPropertyValue('--primary-color').trim();
            chartInstance.data.datasets[0].borderColor = themeColor;
            chartInstance.data.datasets[0].backgroundColor = themeColor + '22';
            chartInstance.data.datasets[0].pointBackgroundColor = themeColor;
            chartInstance.update();
        }
    }

    // Protection helpers to safely format object strings and selectors
    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
    function cssSafeId(str) {
        return str.replace(/[^a-zA-Z0-9]/g, '_');
    }
</script>
</body>
</html>
